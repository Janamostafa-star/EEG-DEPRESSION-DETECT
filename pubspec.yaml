name: advanced_new_app_fixed
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.0

  # FILE PICKER
  file_picker: ^8.1.2

  # IMAGE PICKER - ADD THIS

  http: ^1.2.0
  google_generative_ai: ^0.4.0
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # FIREBASE PACKAGES
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.12

  # GOOGLE SIGN IN
  google_sign_in: ^6.2.1
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2

  pdf: ^3.10.0
  printing: ^5.11.0  # Or path_provider + open_file
  path_provider: ^2.1.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/splash_background.jpeg
    - assets/spinner_logo.png
    - assets/login_background.jpeg
    - assets/doctor_profile_placeholder.png
    - assets/google_logo.jpg
    - assets/app_logo.jpeg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_logo.jpeg"